name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'   # Weekly refresh (Monday 6 AM UTC)
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    # Opt into Node 24 for JS-based actions (GitHub deprecation of Node 20 action runtimes).
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install duckdb httpx

      # Prefix must change if a bad public/data/ snapshot was ever saved (see card-data-* on 2026-03-30).
      - name: Cache card data
        id: cache-data
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: actions/cache@v5
        with:
          path: public/data/
          key: pages-data-v2-${{ github.run_id }}
          restore-keys: |
            pages-data-v2-

      # --clear-failed drops bogus failed_sets rows (e.g. after API blips) so ingest
      # is not stuck skipping most sets; then normal ingest resumes / refreshes.
      - name: Ingest card data
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          POKEMON_TCG_API_KEY: ${{ secrets.POKEMON_TCG_API_KEY }}
        run: python scripts/ingest.py --clear-failed

      - name: Export to Parquet
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: python scripts/export_parquet.py

      - name: Commit data files to repo
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/*.parquet public/data/pokemon.duckdb
          git diff --staged --quiet || git commit -m "Update data files [skip ci]"
          git push

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
          VITE_BUILD_DATE: ${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
