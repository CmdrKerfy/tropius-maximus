# Production build + Node unit tests (no Playwright). Cheap gate on every push/PR.
name: Site checks (quick)

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: site-checks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-quick:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check (build + unit tests)
        run: npm run check:quick
