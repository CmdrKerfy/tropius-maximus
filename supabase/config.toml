# Minimal config for Edge Functions (see supabase/functions/README.md).
# For full local dev, run: supabase init (merge carefully).

[functions.request-magic-link]
# Must be false: callers are not logged in yet; they only pass the anon key.
verify_jwt = false

[functions.invite-set-password]
# Same as magic-link: unauthenticated callers send invite code + anon key.
verify_jwt = false
